Admin can upload PDF, json, word/txt,image to extract passage and tokenize the passage.
---
tags:
  - Uploads

summary: Upload a file to extract and tokenize passage

description: >
  This endpoint allows an admin to upload a file in one of the supported formats:
  PDF, JSON, Word, TXT, or Image. The system extracts textual content from the file,
  processes it into a passage, and performs tokenization. The resulting structured
  data is then stored in MongoDB.

  The endpoint automatically detects the file type based on its extension and routes
  it through the appropriate extraction pipeline before tokenization and persistence.

# security:
#   - Bearer: []

consumes:
  - multipart/form-data

parameters:
  - name: file
    in: formData
    required: true
    type: file
    description: The file to upload (PDF, JSON, DOCX, TXT, or image formats)

  - name: language
    in: formData
    required: false
    type: string
    enum: [english, sanskrit]
    description: Language of the document to guide tokenization pipeline

schema:
  - name:JSON Schema
   $ref: '#/definitions/SingleStoryJSON'

responses:
  200:
    description: File successfully processed and tokenized
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: File processed and stored successfully
        data:
          type: object
          description: Tokenized output stored in MongoDB

  400:
    description: Invalid file upload or unsupported format
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Unsupported file type

  401:
    description: Unauthorized access (missing or invalid token)
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Unauthorized

  500:
    description: Internal server error during processing pipeline
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Failed to process file
