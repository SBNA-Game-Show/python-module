---
tags:
  - JSON Upload Schema

summary: JSON Upload Schema Examples

description: >
  JSON formats accepted for uploading Sanskrit and English passages.
  Supports single story JSON and multiple story JSON uploads.

definitions:

  SingleStoryJSON:

    type: object

    required:
      - englishTitle
      - sanskritTitle
      - englishPassage
      - sanskritPassage

    properties:

      englishTitle:
        type: string
        example: "rabbit, weasel, cat"

      sanskritTitle:
        type: string
        example: "शशकः नकुलः मार्जारी च"

      englishPassage:
        type: string
        example: >
          When the rabbit left his home, a weasel moved in
          and refused to move out again.

      sanskritPassage:
        type: array
        items:
          type: string
        example:
          - "शशकः नकुलः मार्जारी च"
          - "एकदिने गृहात् प्रस्थितः एकः शशकः स्वादुं तृणं खादितुम् अगच्छत् ।"



  MultipleStoryJSON:

    type: array

    items:

      type: object

      required:
        - englishTitle
        - sanskritTitle
        - englishPassage
        - sanskritPassage


      properties:

        englishTitle:
          type: string
          example: "rabbit, weasel, cat"

        sanskritTitle:
          type: string
          example: "शशकः नकुलः मार्जारी च"

        englishPassage:
          type: string
          example: >
            When the rabbit left his home, a weasel moved in.

        sanskritPassage:

          type: array

          items:
            type: string

          example:
            - "शशकः नकुलः मार्जारी च"
            - "एकदिने गृहात् प्रस्थितः एकः शशकः स्वादुं तृणं खादितुम् अगच्छत् ।"