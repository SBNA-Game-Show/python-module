Get all Available Stories to downloaded from Learn Sanskrit.cc
---
tags:
  - Learn LearnSanskrit.cc Meta Data

summary: Retrieve all available stories

description: >
  Returns all available fables that are available to be taken from https://learnsanskrit.cc/

# security:
#   - Bearer: []

responses:
  200:
    description: Stories retrieved successfully
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object

  400:
    description: to be added later
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Incomplete

  500:
    description: Internal server error
    schema:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: An unexpected error occurred
