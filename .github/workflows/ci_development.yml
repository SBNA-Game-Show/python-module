name: CI Pipeline - Development


on:

  push:
    branches:
      - development


jobs:

  test:

    name: Build and Test Development Environment

    runs-on: ubuntu-latest


    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Verify Docker Installation
        run: |
          docker --version
          docker compose version


      - name: Verify Secrets
        env:
          ATLAS_URI: ${{ secrets.ATLAS_URI }}

        run: |
          if [ -z "$ATLAS_URI" ]; then
              echo "ATLAS_URI secret missing"
              exit 1
          else
              echo "ATLAS_URI secret available"
          fi


      - name: Build Development Docker Image
        run: |
          docker build \
            -f docker.dev/Dockerfile \
            -t sb-dict-dev:test .


      - name: Run Pytest
        env:
          ATLAS_URI: ${{ secrets.ATLAS_URI }}

        run: |
          docker run --rm \
          -e PYTHONPATH=/app \
          -e ATLAS_URI="$ATLAS_URI" \
          -e DATABASE_NAME="WordComplex" \
          sb-dict-dev:test \
          pytest tests -v


      - name: Run Coverage Tests
        env:
          ATLAS_URI: ${{ secrets.ATLAS_URI }}

        run: |
          docker run --rm \
          -e PYTHONPATH=/app \
          -e ATLAS_URI="$ATLAS_URI" \
          -e DATABASE_NAME="WordComplex" \
          sb-dict-dev:test \
          sh -c "pip install pytest-cov && pytest tests --cov=. --cov-report=term-missing"


      - name: Cleanup Docker Image
        if: always()

        run: |
          docker rmi sb-dict-dev:test || true